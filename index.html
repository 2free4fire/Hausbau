<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>EFH Halle – VR-Grundriss v2 (Meta Quest 3)</title>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    #hud{position:fixed;left:12px;bottom:12px;z-index:9999;font-family:system-ui,sans-serif;
      font-size:13px;line-height:1.45;background:rgba(20,22,26,.8);color:#fff;padding:10px 14px;
      border-radius:10px;max-width:340px;pointer-events:none}
    #hud b{color:#ffd479}
    .a-enter-vr-button{background-color:#2e7d5b !important}
  </style>
</head>
<body>
  <div id="hud">
    <b>VR (Quest 3):</b> linker Stick = laufen · rechter Stick = drehen.<br>
    <b>Türen:</b> Hand an den Griff + <b>Grip halten</b> = realistisch schwenken · <b>Trigger</b> (zeigen) = auf/zu.<br>
    <b>Maßband:</b> rechter Controller zeigt Entfernung an.<br>
    <b>Desktop:</b> WASD + Maus · <b>R</b> = Startposition.
  </div>

  <!-- ===========================================================================
       1) PLAYER-CONTROLLER : Bewegung (VR-Stick + WASD), Wand-Kollision (geschoss-
          weise, 2D-AABB) und "Boden-Folgen" (Strahl nach unten) -> Treppe steigen.
       =========================================================================== -->
  <script>
  AFRAME.registerComponent('player-controller', {
    schema:{ speed:{default:2.4}, snap:{default:30}, radius:{default:0.28} },
    init(){
      this.keys={}; this.lv={x:0,y:0}; this.snapReady=true; this.targetY=0;
      this.dir=new THREE.Vector3(); this.right=new THREE.Vector3();
      this.up=new THREE.Vector3(0,1,0); this.tmp=new THREE.Vector3();
      this.ray=new THREE.Raycaster(new THREE.Vector3(), new THREE.Vector3(0,-1,0), 0, 8);
      this.walls=null; this.walkables=null;
      this.start={x:this.el.object3D.position.x, z:this.el.object3D.position.z};
      addEventListener('keydown',e=>{this.keys[e.code]=true; if(e.code==='KeyR')this.reset();});
      addEventListener('keyup',e=>{this.keys[e.code]=false;});
      this.el.sceneEl.addEventListener('thumbstickmoved', e=>{
        const id=e.target.id; let x=e.detail.x, y=e.detail.y;
        if(id==='leftHand'){ this.lv.x=Math.abs(x)<0.12?0:x; this.lv.y=Math.abs(y)<0.12?0:y; }
        else if(id==='rightHand'){
          if(x>0.6&&this.snapReady){ this.el.object3D.rotation.y-=THREE.MathUtils.degToRad(this.data.snap); this.snapReady=false; }
          else if(x<-0.6&&this.snapReady){ this.el.object3D.rotation.y+=THREE.MathUtils.degToRad(this.data.snap); this.snapReady=false; }
          else if(Math.abs(x)<0.3) this.snapReady=true;
        }
      });
    },
    reset(){ this.el.object3D.position.set(this.start.x,0,this.start.z); this.targetY=0; },
    blocked(x,z,r){
      const feet=this.el.object3D.position.y;
      for(const w of this.walls){
        if(feet < w.yTop && feet+1.8 > w.yBase &&
           x > w.minX-r && x < w.maxX+r && z > w.minZ-r && z < w.maxZ+r) return true;
      }
      return false;
    },
    tick(t,dt){
      if(!dt) return; dt=Math.min(dt,50);
      if(window.HOUSE && window.HOUSE.ready && !this.walls){
        this.walls=window.HOUSE.walls;
        this.walkables=window.HOUSE.walkables.map(e=>e.object3D);
      }
      // --- Eingabe (Stick + WASD), relativ zur Blickrichtung ---
      let ix=this.lv.x, iz=this.lv.y;
      if(this.keys['KeyW'])iz-=1; if(this.keys['KeyS'])iz+=1;
      if(this.keys['KeyA'])ix-=1; if(this.keys['KeyD'])ix+=1;
      const cam=this.el.sceneEl.camera;
      if((ix||iz)&&cam){
        cam.getWorldDirection(this.dir); this.dir.y=0;
        if(this.dir.lengthSq()>1e-5){
          this.dir.normalize(); this.right.crossVectors(this.dir,this.up).normalize();
          this.tmp.set(0,0,0).addScaledVector(this.dir,-iz).addScaledVector(this.right,ix);
          if(this.tmp.lengthSq()>1e-5){
            this.tmp.normalize().multiplyScalar(this.data.speed*dt/1000);
            const p=this.el.object3D.position, r=this.data.radius;
            if(this.walls){  // achsweise -> "Gleiten" an Waenden
              if(!this.blocked(p.x+this.tmp.x, p.z, r)) p.x+=this.tmp.x;
              if(!this.blocked(p.x, p.z+this.tmp.z, r)) p.z+=this.tmp.z;
            } else { p.x+=this.tmp.x; p.z+=this.tmp.z; }
          }
        }
      }
      // --- Boden folgen (Treppe/Geschosse) ---
      if(this.walkables && this.walkables.length){
        const p=this.el.object3D.position;
        this.ray.ray.origin.set(p.x, p.y+2.2, p.z);
        const hits=this.ray.intersectObjects(this.walkables,true);
        let best=null;
        for(const h of hits){ if(h.point.y <= p.y+1.9 && (!best||h.point.y>best.point.y)) best=h; }
        if(best) this.targetY=best.point.y;
        p.y += (this.targetY - p.y)*Math.min(1, dt/120);
      }
    }
  });
  </script>

  <!-- ===========================================================================
       2) GRABBABLE-DOOR : Tür um Scharnier.
          Grip nah am Griff = Tür folgt der Hand (realistisches Aufklinken).
          Trigger (mit dem rechten Controller auf das Türblatt zeigen) = auf/zu.
       =========================================================================== -->
  <script>
  AFRAME.registerComponent('grabbable-door', {
    schema:{ openMax:{default:95}, swing:{default:1} },
    init(){
      this.curr=0; this.target=null; this.grabbed=null;
      this.leaf=this.el.querySelector('.door-leaf');
      this.width=this.leaf?parseFloat(this.leaf.getAttribute('width')):0.9;
      this.baseYaw=this.el.object3D.rotation.y;
      // geschlossene Griff-Weltposition (math., ohne Matrix) -> Referenzwinkel
      const lx=this.width-0.07, lz=0.06;
      const c=Math.cos(this.baseYaw), s=Math.sin(this.baseYaw);
      const gx=lx*c+lz*s, gz=-lx*s+lz*c;          // rotateY(baseYaw)
      this.hx=this.el.object3D.position.x; this.hz=this.el.object3D.position.z;
      this.closedAng=Math.atan2(gx, gz);
      const scene=this.el.sceneEl;
      scene.addEventListener('gripdown', e=>{
        const c=e.target; if(!c||!c.object3D) return;
        const cp=new THREE.Vector3(); c.object3D.getWorldPosition(cp);
        const ang=this.baseYaw+this.data.swing*THREE.MathUtils.degToRad(this.curr);
        const cc=Math.cos(ang), ss=Math.sin(ang);
        const hgx=this.hx + (lx*cc+lz*ss), hgz=this.hz + (-lx*ss+lz*cc);
        const dx=cp.x-hgx, dz=cp.z-hgz, hy=cp.y;
        if(Math.hypot(dx,dz)<0.4 && hy>0.4){ this.grabbed=c; }
      });
      scene.addEventListener('gripup', e=>{ if(this.grabbed===e.target) this.grabbed=null; });
      scene.addEventListener('triggerdown', e=>{
        const r=e.target&&e.target.components&&e.target.components.raycaster;
        if(r&&r.intersectedEls&&r.intersectedEls.indexOf(this.leaf)>-1) this.toggle();
      });
    },
    toggle(){ this.target=(this.curr<45)?this.data.openMax:0; },
    norm(a){ while(a>180)a-=360; while(a<-180)a+=360; return a; },
    tick(t,dt){
      if(this.grabbed){
        const cp=new THREE.Vector3(); this.grabbed.object3D.getWorldPosition(cp);
        const handAng=THREE.MathUtils.radToDeg(Math.atan2(cp.x-this.hx, cp.z-this.hz));
        const d=this.norm(handAng - THREE.MathUtils.radToDeg(this.closedAng));
        this.curr=Math.max(0, Math.min(this.data.openMax, this.data.swing*d));
        this.target=null;
      } else if(this.target!=null){
        this.curr += (this.target-this.curr)*Math.min(1, (dt||16)/180);
      }
      this.el.object3D.rotation.y = this.baseYaw + this.data.swing*THREE.MathUtils.degToRad(this.curr);
    }
  });
  </script>

  <!-- 3) TAPE-MEASURE : Entfernungsanzeige am rechten Controller -->
  <script>
  AFRAME.registerComponent('tape-measure', {
    init(){
      const bg=document.createElement('a-plane');
      bg.setAttribute('width',0.22); bg.setAttribute('height',0.06);
      bg.setAttribute('color','#ffe9a8'); bg.setAttribute('opacity',0.92);
      bg.setAttribute('position','0 0.02 -0.06'); bg.setAttribute('rotation','-40 0 0');
      this.txt=document.createElement('a-text');
      this.txt.setAttribute('value','— m'); this.txt.setAttribute('align','center');
      this.txt.setAttribute('color','#141414'); this.txt.setAttribute('width',0.7);
      this.txt.setAttribute('position','0 0.021 -0.06'); this.txt.setAttribute('rotation','-40 0 0');
      this.el.appendChild(bg); this.el.appendChild(this.txt);
    },
    tick(){
      const r=this.el.components.raycaster;
      if(r&&r.intersections&&r.intersections.length){
        this.txt.setAttribute('value', r.intersections[0].distance.toFixed(2)+' m');
      } else this.txt.setAttribute('value','—');
    }
  });
  </script>

  <a-scene renderer="colorManagement:true; antialias:true" background="color:#aee0f5" vr-mode-ui="enabled:true">
    <!-- Licht: kraeftiges Ambient, damit geschlossene Raeume hell bleiben -->
    <a-entity light="type:ambient; color:#ffffff; intensity:0.95"></a-entity>
    <a-entity light="type:hemisphere; color:#ffffff; groundColor:#c8c0b0; intensity:0.55"></a-entity>
    <a-entity light="type:directional; intensity:0.45" position="9 14 -6"></a-entity>
    <a-sky color="#aee0f5"></a-sky>

    <!-- Kamera-Rig: Start in der Diele, Augenhoehe 1,72 m, Blick ins Haus (+Z) -->
    <a-entity id="rig" position="5.0 0 2.2" rotation="0 180 0" player-controller>
      <a-entity id="camera" camera position="0 1.72 0" look-controls="pointerLockEnabled:false"></a-entity>
      <a-entity id="leftHand" oculus-touch-controls="hand:left"></a-entity>
      <a-entity id="rightHand" oculus-touch-controls="hand:right"
                raycaster="objects:.door-leaf, .measurable; far:6; interval:80; showLine:true; lineColor:#ffcf6b"
                tape-measure></a-entity>
    </a-entity>

    <a-entity id="building"></a-entity>
  </a-scene>

  <!-- ===========================================================================
       GEBAEUDE-GENERATOR  (Koordinaten exakt aus deiner Tabelle)
       X = West->Ost (0..10), Z = Nord->Sued (0..11)
       Aussenwand 0,44 (Innenseite bei 0,44 / 9,56 / 10,56) · Innenwand 0,12
       EG: Boden 0,00 · lichte Hoehe 2,75 · OG: Boden +2,90 · lichte Hoehe 2,50
       =========================================================================== -->
  <script>
  (function(){
    window.HOUSE={ walls:[], walkables:[], ready:false };
    const H=window.HOUSE;

    const WALL='#eef0f2', GLASS='#bfe3f2', INT=0.12, EXT=0.44;
    const C={ // Farbcodierte Boeden je Raum (visuelle Trennung / Groessenwirkung)
      diele:'#d8c9a8', buero:'#bcd3c0', har:'#cbb9c9', kueche:'#c9d6b0', wohnen:'#cfd8e6',
      gard:'#e0cdb0', wc:'#bcd6d6', schlaf:'#b9c2da', ankl:'#d8c2b0', k1:'#bfd9c0',
      k2:'#d8c0d4', k3:'#d4c895', bad:'#bfe0ea', flur:'#d0cfc8', terr:'#bdb6a6', gar:'#b6b9bd'
    };
    const EG={base:0.0, hExt:2.90, hInt:2.75};
    const OG={base:2.90, hExt:2.50, hInt:2.50};

    function box(p,x,y,z,w,h,d,color,opts){
      opts=opts||{}; const e=document.createElement('a-box');
      e.setAttribute('position',x+' '+y+' '+z);
      e.setAttribute('width',w); e.setAttribute('height',h); e.setAttribute('depth',d);
      e.setAttribute('color',color); e.setAttribute('shadow','cast:false;receive:false');
      if(opts.opacity!=null){e.setAttribute('opacity',opts.opacity);e.setAttribute('transparent','true');}
      if(opts.roughness!=null)e.setAttribute('roughness',opts.roughness);
      if(opts.cls)e.setAttribute('class',opts.cls);
      p.appendChild(e); return e;
    }
    function cyl(p,x,y,z,r,h,color){
      const e=document.createElement('a-cylinder');
      e.setAttribute('position',x+' '+y+' '+z); e.setAttribute('radius',r);
      e.setAttribute('height',h); e.setAttribute('color',color);
      p.appendChild(e); return e;
    }
    function label(p,x,z,text,y){
      const e=document.createElement('a-text');
      e.setAttribute('value',text); e.setAttribute('align','center');
      e.setAttribute('color','#23262b'); e.setAttribute('width',3.4);
      e.setAttribute('position',x+' '+(y)+' '+z); e.setAttribute('rotation','-90 0 0');
      p.appendChild(e);
    }

    /* Wand mit Oeffnungen. Registriert Kollider fuer volle Segmente + Bruestungen.
       openings: {start, width, sill, head, glass} (start = Abstand ab Startpunkt) */
    function wall(p, x1,z1,x2,z2, base, height, thick, color, openings){
      openings=(openings||[]).slice().sort((a,b)=>a.start-b.start);
      const horiz=Math.abs(z2-z1)<1e-6, length=Math.hypot(x2-x1,z2-z1);
      const cx=(x1+x2)/2, cz=(z1+z2)/2, dX=Math.sign(x2-x1)||1, dZ=Math.sign(z2-z1)||1;
      function seg(centerAlong, segLen, yC, segH, collide){
        if(segLen<=0.001||segH<=0.001) return;
        let x,z,w,d;
        if(horiz){ x=x1+dX*centerAlong; z=cz; w=segLen; d=thick; }
        else     { z=z1+dZ*centerAlong; x=cx; d=segLen; w=thick; }
        box(p, x, yC, z, w, segH, d, color, {cls:'measurable'});
        if(collide) H.walls.push({minX:x-w/2,maxX:x+w/2,minZ:z-d/2,maxZ:z+d/2,yBase:yC-segH/2,yTop:yC+segH/2});
      }
      function glass(centerAlong, segLen, yC, segH){
        if(horiz) box(p, x1+dX*centerAlong, yC, cz, segLen, segH, 0.05, GLASS,{opacity:0.28,roughness:0});
        else      box(p, cx, yC, z1+dZ*centerAlong, 0.05, segH, segLen, GLASS,{opacity:0.28,roughness:0});
      }
      let cur=0; const solids=[];
      for(const o of openings){ if(o.start>cur) solids.push([cur,o.start]); cur=o.start+o.width; }
      if(cur<length) solids.push([cur,length]);
      for(const s of solids){ const L=s[1]-s[0]; seg((s[0]+s[1])/2, L, base+height/2, height, true); }
      for(const o of openings){
        const c=o.start+o.width/2, sill=o.sill||0, head=(o.head!=null)?o.head:2.10;
        if(sill>0.001) seg(c, o.width, base+sill/2, sill, true);             // Bruestung (kollidiert)
        if(head<height-0.001) seg(c, o.width, base+head+(height-head)/2, height-head, false); // Sturz
        if(o.glass) glass(c, o.width, base+sill+(head-sill)/2, head-sill);
      }
    }

    /* Bodenplatte/Decke mit optionalem rechteckigem Loch (Treppenauge) */
    function slabHole(p, x1,z1,x2,z2, yTop, thick, color, hx1,hz1,hx2,hz2, walk){
      const yc=yTop-thick/2;
      const add=(ax1,az1,ax2,az2)=>{ if(ax2-ax1<0.01||az2-az1<0.01)return;
        const b=box(p,(ax1+ax2)/2,yc,(az1+az2)/2,ax2-ax1,thick,az2-az1,color,{cls:'measurable'});
        if(walk)H.walkables.push(b); };
      if(hx1==null){ add(x1,z1,x2,z2); return; }
      add(x1,z1,x2,hz1); add(x1,hz2,x2,z2);            // Nord-/Sued-Streifen
      add(x1,hz1,hx1,hz2); add(hx2,hz1,x2,hz2);        // West-/Ost-Streifen
    }

    /* Farb-Bodenkachel + Beschriftung */
    function tile(p, x1,z1,x2,z2, base, color, name){
      const b=box(p,(x1+x2)/2, base+0.014, (z1+z2)/2, x2-x1, 0.02, z2-z1, color,{cls:'measurable'});
      H.walkables.push(b);
      if(name) label(p,(x1+x2)/2,(z1+z2)/2,name, base+0.03);
    }

    /* Moebel-/Armatur-Platzhalter (farbiger Block, ohne Kollision) */
    function furn(p, cx, cz, w, d, h, color, base){ box(p, cx, base+h/2, cz, w, h, d, color); }

    /* Treppe: 16 Stg., Steigung 18,125 / Auftritt 27 cm, laeuft nach +Z */
    function stairs(p, xL, xR, zStart, base){
      const w=xR-xL, rise=0.18125, go=0.27;
      for(let i=0;i<16;i++){
        const top=(i+1)*rise, z=zStart+(i+0.5)*go;
        const b=box(p,(xL+xR)/2, base+top/2, z, w, top, go, '#8a5a3b'); H.walkables.push(b);
      }
      box(p, xL-0.04, base+1.5, zStart+2.2, 0.06, 3.0, 4.4, '#6f4630',{opacity:0.6,roughness:1});
    }

    /* Greifbare Tuer. axis: 'x'|'z' (Wandverlauf). dir: +1/-1 (Oeffnungsseite ab Scharnier).
       swing: +1/-1 (Schwenkrichtung – bei Bedarf umdrehen). */
    function door(p, hx, hz, width, base, axis, dir, swing){
      let yaw=0;
      if(axis==='x') yaw = (dir>0)?0:Math.PI;            // Blatt entlang +X / -X
      else           yaw = (dir>0)?-Math.PI/2:Math.PI/2; // Blatt entlang +Z / -Z
      const hinge=document.createElement('a-entity');
      hinge.setAttribute('position', hx+' '+base+' '+hz);
      hinge.setAttribute('rotation', '0 '+THREE.MathUtils.radToDeg(yaw)+' 0');
      hinge.setAttribute('class','door');
      const leaf=document.createElement('a-box');
      leaf.setAttribute('class','door-leaf measurable');
      leaf.setAttribute('width',width); leaf.setAttribute('height',2.01); leaf.setAttribute('depth',0.045);
      leaf.setAttribute('color','#9a6a44'); leaf.setAttribute('position',(width/2)+' 1.005 0');
      hinge.appendChild(leaf);
      const handle=document.createElement('a-sphere');
      handle.setAttribute('radius',0.045); handle.setAttribute('color','#e6c259');
      handle.setAttribute('position',(width-0.08)+' 1.05 0.06'); hinge.appendChild(handle);
      hinge.setAttribute('grabbable-door','swing:'+swing);
      p.appendChild(hinge);
    }

    /* Menschliche Referenzfigur ~1,75 m (Massstabsanker) */
    function human(p,x,z,base){
      cyl(p, x, base+0.45, z, 0.16, 0.9, '#e0883c');     // Beine
      cyl(p, x, base+1.12, z, 0.20, 0.55, '#e0883c');    // Rumpf
      const head=document.createElement('a-sphere');
      head.setAttribute('position', x+' '+(base+1.62)+' '+z); head.setAttribute('radius',0.12);
      head.setAttribute('color','#f0b07a'); p.appendChild(head);
      const t=document.createElement('a-text');
      t.setAttribute('value','1,75 m'); t.setAttribute('color','#bb4a14'); t.setAttribute('align','center');
      t.setAttribute('width',1.6); t.setAttribute('position', x+' '+(base+1.95)+' '+z);
      t.setAttribute('rotation','0 180 0'); p.appendChild(t);
    }

    /* Hoehenlineal an einer Wand: Markierungen 0,5 / 1,0 / 1,5 / 2,0 / 2,5 m */
    function ruler(p,x,z,base){
      box(p, x, base+1.25, z, 0.04, 2.5, 0.04, '#444');
      for(let h=0.5; h<=2.5+1e-3; h+=0.5){
        box(p, x, base+h, z+0.06, 0.22, 0.012, 0.012, '#d92');
        const t=document.createElement('a-text');
        t.setAttribute('value', h.toFixed(1).replace('.',',')+' m'); t.setAttribute('color','#a36b00');
        t.setAttribute('width',1.4); t.setAttribute('align','left');
        t.setAttribute('position', (x+0.16)+' '+(base+h)+' '+(z+0.06));
        p.appendChild(t);
      }
    }

    // 1-m-Rasen-Raster als prozedurale Textur
    function gridGround(scene){
      const c=document.createElement('canvas'); c.width=c.height=256;
      const g=c.getContext('2d'); g.fillStyle='#6ba85a'; g.fillRect(0,0,256,256);
      g.strokeStyle='rgba(255,255,255,0.30)'; g.lineWidth=3; g.strokeRect(0,0,256,256);
      const url=c.toDataURL();
      const gr=document.createElement('a-plane');
      gr.setAttribute('position','8 -0.02 5'); gr.setAttribute('rotation','-90 0 0');
      gr.setAttribute('width',90); gr.setAttribute('height',90); gr.setAttribute('color','#ffffff');
      scene.appendChild(gr);
      gr.addEventListener('loaded',()=>{
        const tex=new THREE.TextureLoader().load(url);
        tex.wrapS=tex.wrapT=THREE.RepeatWrapping; tex.repeat.set(90,90);
        const m=gr.getObject3D('mesh'); if(m){ m.material.map=tex; m.material.needsUpdate=true; }
      });
      H.walkables.push(gr);
    }

    // =========================================================================
    function build(){
      const p=document.getElementById('building');
      const scene=document.querySelector('a-scene');
      gridGround(scene);

      const VOID={x1:3.70,z1:3.40,x2:4.90,z2:7.90};   // Treppenauge im OG

      // ---------------- BOEDEN / DECKEN / DACH ----------------
      box(p, 5.0, -0.05, 5.5, 9.12, 0.10, 10.12, '#7a6248'); H.walkables.push(p.lastChild); // EG-Rohboden
      box(p, 13.2,-0.05, 4.5, 6.0, 0.10, 8.6, '#8d9094'); H.walkables.push(p.lastChild);   // Garagenboden
      slabHole(p, 0.44,0.44,9.56,10.56, 2.90, 0.15, '#c9cdd2', VOID.x1,VOID.z1,VOID.x2,VOID.z2, true); // EG-Decke/OG-Boden
      slabHole(p, 0.44,0.44,9.56,10.56, 5.40, 0.20, '#d9dadb', null,null,null,null, false);           // OG-Decke/Dach
      box(p, 13.2, 2.65, 4.5, 6.0, 0.15, 8.6, '#d9dadb');                                              // Garagendach
      stairs(p, 3.80, 4.80, 3.55, 0.0);

      // ======================================================================
