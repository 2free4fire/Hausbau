<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>EFH Halle – VR-Grundriss v3 (Meta Quest 3)</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<style>
#hud{position:fixed;left:12px;bottom:12px;z-index:9999;font-family:system-ui,sans-serif;
font-size:13px;line-height:1.45;background:rgba(20,22,26,.8);color:#fff;padding:10px 14px;
border-radius:10px;max-width:350px;pointer-events:none}
#hud b{color:#ffd479}
.a-enter-vr-button{background-color:#2e7d5b !important}
</style>
</head>
<body>
<div id="hud">
<b>VR (Quest 3):</b> linker Stick = laufen · rechter Stick = drehen.<br>
<b>Drehtüren:</b> Hand an den Griff + Grip = schwenken · Trigger (zeigen) = auf/zu.<br>
<b>Lofttür (Schiebetür):</b> Grip am Blatt halten + Hand bewegen, oder Trigger.<br>
<b>Maßband:</b> rechter Controller · <b>Desktop:</b> WASD + Maus · <b>R</b> = Start.
</div>

<script>
/* ---- PLAYER: Bewegung + Wand-Kollision + Boden-Folgen (Treppe) ---- */
AFRAME.registerComponent('player-controller',{
schema:{speed:{default:2.4},snap:{default:30},radius:{default:0.28}},
init(){
this.keys={};this.lv={x:0,y:0};this.snapReady=true;this.targetY=0;
this.dir=new THREE.Vector3();this.right=new THREE.Vector3();
this.up=new THREE.Vector3(0,1,0);this.tmp=new THREE.Vector3();
this.ray=new THREE.Raycaster(new THREE.Vector3(),new THREE.Vector3(0,-1,0),0,8);
this.walls=null;this.walkables=null;
this.start={x:this.el.object3D.position.x,z:this.el.object3D.position.z};
addEventListener('keydown',e=>{this.keys[e.code]=true;if(e.code==='KeyR')this.reset();});
addEventListener('keyup',e=>{this.keys[e.code]=false;});
this.el.sceneEl.addEventListener('thumbstickmoved',e=>{
const id=e.target.id;let x=e.detail.x,y=e.detail.y;
if(id==='leftHand'){this.lv.x=Math.abs(x)<0.12?0:x;this.lv.y=Math.abs(y)<0.12?0:y;}
else if(id==='rightHand'){
if(x>0.6&&this.snapReady){this.el.object3D.rotation.y-=THREE.MathUtils.degToRad(this.data.snap);this.snapReady=false;}
else if(x<-0.6&&this.snapReady){this.el.object3D.rotation.y+=THREE.MathUtils.degToRad(this.data.snap);this.snapReady=false;}
else if(Math.abs(x)<0.3)this.snapReady=true;}
});
},
reset(){this.el.object3D.position.set(this.start.x,0,this.start.z);this.targetY=0;},
blocked(x,z,r){
const f=this.el.object3D.position.y;
for(const w of this.walls){
if(f<w.yTop&&f+1.8>w.yBase&&x>w.minX-r&&x<w.maxX+r&&z>w.minZ-r&&z<w.maxZ+r)return true;}
return false;},
tick(t,dt){
if(!dt)return;dt=Math.min(dt,50);
if(window.HOUSE&&window.HOUSE.ready&&!this.walls){this.walls=window.HOUSE.walls;this.walkables=window.HOUSE.walkables.map(e=>e.object3D);}
let ix=this.lv.x,iz=this.lv.y;
if(this.keys['KeyW'])iz-=1;if(this.keys['KeyS'])iz+=1;if(this.keys['KeyA'])ix-=1;if(this.keys['KeyD'])ix+=1;
const cam=this.el.sceneEl.camera;
if((ix||iz)&&cam){
cam.getWorldDirection(this.dir);this.dir.y=0;
if(this.dir.lengthSq()>1e-5){
this.dir.normalize();this.right.crossVectors(this.dir,this.up).normalize();
this.tmp.set(0,0,0).addScaledVector(this.dir,-iz).addScaledVector(this.right,ix);
if(this.tmp.lengthSq()>1e-5){
this.tmp.normalize().multiplyScalar(this.data.speed*dt/1000);
const p=this.el.object3D.position,r=this.data.radius;
if(this.walls){
if(!this.blocked(p.x+this.tmp.x,p.z,r))p.x+=this.tmp.x;
if(!this.blocked(p.x,p.z+this.tmp.z,r))p.z+=this.tmp.z;
}else{p.x+=this.tmp.x;p.z+=this.tmp.z;}}}}
if(this.walkables&&this.walkables.length){
const p=this.el.object3D.position;
this.ray.ray.origin.set(p.x,p.y+2.2,p.z);
const hits=this.ray.intersectObjects(this.walkables,true);
let best=null;
for(const h of hits){if(h.point.y<=p.y+1.9&&(!best||h.point.y>best.point.y))best=h;}
if(best)this.targetY=best.point.y;
p.y+=(this.targetY-p.y)*Math.min(1,dt/120);}
}});

/* ---- DREHTÜR: Grip am Griff = der Hand folgen · Trigger = auf/zu ---- */
AFRAME.registerComponent('grabbable-door',{
schema:{openMax:{default:95},swing:{default:1}},
init(){
this.curr=0;this.target=null;this.grabbed=null;
this.leaf=this.el.querySelector('.door-leaf');
this.width=this.leaf?parseFloat(this.leaf.getAttribute('width')):0.9;
this.baseYaw=this.el.object3D.rotation.y;
const lx=this.width-0.07,lz=0.06,c=Math.cos(this.baseYaw),s=Math.sin(this.baseYaw);
const gx=lx*c+lz*s,gz=-lx*s+lz*c;
this.hx=this.el.object3D.position.x;this.hz=this.el.object3D.position.z;
this.closedAng=Math.atan2(gx,gz);
const scene=this.el.sceneEl;
scene.addEventListener('gripdown',e=>{
const c=e.target;if(!c||!c.object3D)return;
const cp=new THREE.Vector3();c.object3D.getWorldPosition(cp);
const ang=this.baseYaw+this.data.swing*THREE.MathUtils.degToRad(this.curr);
const cc=Math.cos(ang),ss=Math.sin(ang);
const hgx=this.hx+(lx*cc+lz*ss),hgz=this.hz+(-lx*ss+lz*cc);
if(Math.hypot(cp.x-hgx,cp.z-hgz)<0.4&&cp.y>0.4)this.grabbed=c;});
scene.addEventListener('gripup',e=>{if(this.grabbed===e.target)this.grabbed=null;});
scene.addEventListener('triggerdown',e=>{
const r=e.target&&e.target.components&&e.target.components.raycaster;
if(r&&r.intersectedEls&&r.intersectedEls.indexOf(this.leaf)>-1)this.target=(this.curr<45)?this.data.openMax:0;});
},
norm(a){while(a>180)a-=360;while(a<-180)a+=360;return a;},
tick(t,dt){
if(this.grabbed){
const cp=new THREE.Vector3();this.grabbed.object3D.getWorldPosition(cp);
const ha=THREE.MathUtils.radToDeg(Math.atan2(cp.x-this.hx,cp.z-this.hz));
const d=this.norm(ha-THREE.MathUtils.radToDeg(this.closedAng));
this.curr=Math.max(0,Math.min(this.data.openMax,this.data.swing*d));this.target=null;
}else if(this.target!=null){this.curr+=(this.target-this.curr)*Math.min(1,(dt||16)/180);}
this.el.object3D.rotation.y=this.baseYaw+this.data.swing*THREE.MathUtils.degToRad(this.curr);
}});

/* ---- SCHIEBETÜR (Lofttür): Grip am Blatt = entlang X schieben · Trigger = auf/zu ---- */
AFRAME.registerComponent('sliding-door',{
schema:{open:{default:1.7},sign:{default:-1}},
init(){
this.t=0;this.target=null;this.grabbed=null;
this.closedX=this.el.object3D.position.x;
const scene=this.el.sceneEl;
scene.addEventListener('gripdown',e=>{
const c=e.target;if(!c||!c.object3D)return;
const cp=new THREE.Vector3();c.object3D.getWorldPosition(cp);
const lp=new THREE.Vector3();this.el.object3D.getWorldPosition(lp);
if(cp.distanceTo(lp)<0.7&&cp.y>0.4){this.grabbed=c;this.gx=cp.x;this.t0=this.t;}});
scene.addEventListener('gripup',e=>{if(this.grabbed===e.target)this.grabbed=null;});
scene.addEventListener('triggerdown',e=>{
const r=e.target&&e.target.components&&e.target.components.raycaster;
if(r&&r.intersectedEls&&r.intersectedEls.indexOf(this.el)>-1)this.target=(this.t<0.5)?1:0;});
},
tick(t,dt){
if(this.grabbed){
const cp=new THREE.Vector3();this.grabbed.object3D.getWorldPosition(cp);
this.t=Math.max(0,Math.min(1,this.t0+(cp.x-this.gx)*this.data.sign/this.data.open));this.target=null;
}else if(this.target!=null){this.t+=(this.target-this.t)*Math.min(1,(dt||16)/220);}
this.el.object3D.position.x=this.closedX+this.data.sign*this.data.open*this.t;
}});

/* ---- MASSBAND am rechten Controller ---- */
AFRAME.registerComponent('tape-measure',{
init(){
const bg=document.createElement('a-plane');
bg.setAttribute('width',0.22);bg.setAttribute('height',0.06);bg.setAttribute('color','#ffe9a8');
bg.setAttribute('opacity',0.92);bg.setAttribute('position','0 0.02 -0.06');bg.setAttribute('rotation','-40 0 0');
this.txt=document.createElement('a-text');
this.txt.setAttribute('value','— m');this.txt.setAttribute('align','center');this.txt.setAttribute('color','#141414');
this.txt.setAttribute('width',0.7);this.txt.setAttribute('position','0 0.021 -0.06');this.txt.setAttribute('rotation','-40 0 0');
this.el.appendChild(bg);this.el.appendChild(this.txt);
},
tick(){
const r=this.el.components.raycaster;
if(r&&r.intersections&&r.intersections.length)this.txt.setAttribute('value',r.intersections[0].distance.toFixed(2)+' m');
else this.txt.setAttribute('value','—');
}});
</script>

<a-scene renderer="colorManagement:true; antialias:true" shadow="type:pcf" fog="type:linear; color:#d6e2ee; near:20; far:60" background="color:#aee0f5" vr-mode-ui="enabled:true">
<a-entity id="suntarget" position="8 0 5"></a-entity>
<a-entity light="type:ambient; color:#fff3e6; intensity:0.40"></a-entity>
<a-entity light="type:hemisphere; color:#cfe3f5; groundColor:#6f5f47; intensity:0.55"></a-entity>
<a-entity light="type:directional; color:#fff2dd; intensity:1.25; castShadow:true; shadowMapWidth:1024; shadowMapHeight:1024; shadowCameraLeft:-13; shadowCameraRight:13; shadowCameraTop:13; shadowCameraBottom:-13; shadowCameraNear:0.5; shadowCameraFar:55; shadowBias:-0.0012; target:#suntarget" position="8 17 19"></a-entity>
<a-sky color="#aee0f5"></a-sky>

<a-entity id="rig" position="5.2 0 2.0" rotation="0 180 0" player-controller>
<a-entity id="camera" camera position="0 1.72 0" look-controls="pointerLockEnabled:false"></a-entity>
<a-entity id="leftHand" oculus-touch-controls="hand:left"></a-entity>
<a-entity id="rightHand" oculus-touch-controls="hand:right"
raycaster="objects:.door-leaf, .slide-leaf, .measurable; far:6; interval:80; showLine:true; lineColor:#ffcf6b"
tape-measure></a-entity>
</a-entity>
<a-entity id="building"></a-entity>
</a-scene>

<script>
(function(){
window.HOUSE={walls:[],walkables:[],ready:false};
const H=window.HOUSE;
const WALL='#b4b8bd',GLASS='#bfe3f2',ANTH='#34383d',INT=0.12,EXT=0.44;
const EG={base:0.0,hExt:2.90,hInt:2.75};
const OG={base:2.90,hExt:2.50,hInt:2.50};
const VOID={x1:6.40,z1:3.94,x2:9.56,z2:6.48};

function box(p,x,y,z,w,h,d,color,opts){
opts=opts||{};const e=document.createElement('a-box');
e.setAttribute('position',x+' '+y+' '+z);
e.setAttribute('width',w);e.setAttribute('height',h);e.setAttribute('depth',d);
let mat='color:'+color+'; roughness:'+(opts.roughness!=null?opts.roughness:0.9)+'; metalness:'+(opts.metalness!=null?opts.metalness:0);
if(opts.opacity!=null)mat+='; opacity:'+opts.opacity+'; transparent:true';
e.setAttribute('material',mat);
let sh='cast:true; receive:true';
if(opts.shadow==='none')sh='cast:false; receive:false';else if(opts.shadow==='receive')sh='cast:false; receive:true';
e.setAttribute('shadow',sh);
if(opts.cls)e.setAttribute('class',opts.cls);
if(opts.rot)e.setAttribute('rotation',opts.rot);
p.appendChild(e);return e;}
function cyl(p,x,y,z,r,h,color){
const e=document.createElement('a-cylinder');
e.setAttribute('position',x+' '+y+' '+z);e.setAttribute('radius',r);e.setAttribute('height',h);e.setAttribute('color',color);
p.appendChild(e);return e;}
function label(p,x,z,text,y){
const e=document.createElement('a-text');
e.setAttribute('value',text);e.setAttribute('align','center');e.setAttribute('color','#23262b');e.setAttribute('width',3.4);
e.setAttribute('position',x+' '+y+' '+z);e.setAttribute('rotation','-90 0 0');p.appendChild(e);}

function wall(p,x1,z1,x2,z2,base,height,thick,color,openings){
openings=(openings||[]).slice().sort((a,b)=>a.start-b.start);
const horiz=Math.abs(z2-z1)<1e-6,length=Math.hypot(x2-x1,z2-z1);
const cx=(x1+x2)/2,cz=(z1+z2)/2,dX=Math.sign(x2-x1)||1,dZ=Math.sign(z2-z1)||1;
function seg(c0,L,yC,H2,collide){
if(L<=0.001||H2<=0.001)return;let x,z,w,d;
if(horiz){x=x1+dX*c0;z=cz;w=L;d=thick;}else{z=z1+dZ*c0;x=cx;d=L;w=thick;}
box(p,x,yC,z,w,H2,d,color,{cls:'measurable'});
if(collide)H.walls.push({minX:x-w/2,maxX:x+w/2,minZ:z-d/2,maxZ:z+d/2,yBase:yC-H2/2,yTop:yC+H2/2});}
function glass(c0,L,yC,H2){var fr=0.06,t=0.09;
if(horiz){var xC=x1+dX*c0;box(p,xC,yC,cz,L,H2,0.04,GLASS,{opacity:0.20,roughness:0.06,cls:'glassmat',shadow:'none'});
box(p,xC,yC+H2/2,cz,L+fr,fr,t,ANTH,{shadow:'none'});box(p,xC,yC-H2/2,cz,L+fr,fr,t,ANTH,{shadow:'none'});
box(p,xC-L/2,yC,cz,fr,H2,t,ANTH,{shadow:'none'});box(p,xC+L/2,yC,cz,fr,H2,t,ANTH,{shadow:'none'});}
else{var zC=z1+dZ*c0;box(p,cx,yC,zC,0.04,H2,L,GLASS,{opacity:0.20,roughness:0.06,cls:'glassmat',shadow:'none'});
box(p,cx,yC+H2/2,zC,t,fr,L+fr,ANTH,{shadow:'none'});box(p,cx,yC-H2/2,zC,t,fr,L+fr,ANTH,{shadow:'none'});
box(p,cx,yC,zC-L/2,t,H2,fr,ANTH,{shadow:'none'});box(p,cx,yC,zC+L/2,t,H2,fr,ANTH,{shadow:'none'});}}
let cur=0;const solids=[];
for(const o of openings){if(o.start>cur)solids.push([cur,o.start]);cur=o.start+o.width;}
if(cur<length)solids.push([cur,length]);
for(const s of solids){const L=s[1]-s[0];seg((s[0]+s[1])/2,L,base+height/2,height,true);}
for(const o of openings){
const c=o.start+o.width/2,sill=o.sill||0,head=(o.head!=null)?o.head:2.10;
if(sill>0.001)seg(c,o.width,base+sill/2,sill,true);
if(head<height-0.001)seg(c,o.width,base+head+(height-head)/2,height-head,false);
if(o.glass)glass(c,o.width,base+sill+(head-sill)/2,head-sill);}}

function slabHole(p,x1,z1,x2,z2,yTop,thick,color,hx1,hz1,hx2,hz2,walk){
const yc=yTop-thick/2;
const add=(a,b,c,d)=>{if(c-a<0.01||d-b<0.01)return;const e=box(p,(a+c)/2,yc,(b+d)/2,c-a,thick,d-b,color,{cls:'measurable'});if(walk)H.walkables.push(e);};
if(hx1==null){add(x1,z1,x2,z2);return;}
add(x1,z1,x2,hz1);add(x1,hz2,x2,z2);add(x1,hz1,hx1,hz2);add(hx2,hz1,x2,hz2);}

function tile(p,x1,z1,x2,z2,base,color,name){
const wet=/BAD|WC|KÜCHE|HAR|GARAGE|GERÄTE|MÜLL|TERRASSE/.test(name||'');
const b=box(p,(x1+x2)/2,base+0.014,(z1+z2)/2,x2-x1,0.02,z2-z1,color,{cls:'measurable '+(wet?'floor-tile':'floor-wood'),shadow:'receive'});H.walkables.push(b);
if(name)label(p,(x1+x2)/2,(z1+z2)/2,name,base+0.03);}
function furn(p,cx,cz,w,d,h,color,base){box(p,cx,base+h/2,cz,w,h,d,color);}

/* Drehtür */
function door(p,hx,hz,width,base,axis,dir,swing){
let yaw=0;
if(axis==='x')yaw=(dir>0)?0:Math.PI;else yaw=(dir>0)?-Math.PI/2:Math.PI/2;
const hinge=document.createElement('a-entity');
hinge.setAttribute('position',hx+' '+base+' '+hz);
hinge.setAttribute('rotation','0 '+THREE.MathUtils.radToDeg(yaw)+' 0');hinge.setAttribute('class','door');
const leaf=document.createElement('a-box');
leaf.setAttribute('class','door-leaf measurable');
leaf.setAttribute('width',width);leaf.setAttribute('height',2.01);leaf.setAttribute('depth',0.045);
leaf.setAttribute('color',ANTH);leaf.setAttribute('position',(width/2)+' 1.005 0');hinge.appendChild(leaf);
const h2=document.createElement('a-sphere');
h2.setAttribute('radius',0.045);h2.setAttribute('color','#c8ccd0');h2.setAttribute('position',(width-0.08)+' 1.05 0.06');hinge.appendChild(h2);
hinge.setAttribute('grabbable-door','swing:'+swing);p.appendChild(hinge);}

/* Schiebetür (Lofttür): Öffnung x1..x1+width an Wand z */
function loft(p,x1,z,width,base){
const leaf=document.createElement('a-box');
leaf.setAttribute('class','slide-leaf measurable glassmat');
leaf.setAttribute('width',width-0.12);leaf.setAttribute('height',1.95);leaf.setAttribute('depth',0.04);
leaf.setAttribute('color',GLASS);leaf.setAttribute('opacity',0.32);leaf.setAttribute('transparent','true');
leaf.setAttribute('position',(x1+width/2)+' '+(base+1.025)+' '+z);
leaf.setAttribute('sliding-door','open:'+(width-0.1)+'; sign:-1');
var W=width-0.05,Hh=2.05,fr=0.06,t=0.07;
box(leaf,0,Hh/2,0,W,fr,t,ANTH);box(leaf,0,-Hh/2,0,W,fr,t,ANTH);
box(leaf,-W/2,0,0,fr,Hh,t,ANTH);box(leaf,W/2,0,0,fr,Hh,t,ANTH);
p.appendChild(leaf);
box(p,(x1+width/2),base+2.18,z,width+0.2,0.12,0.10,ANTH);}

/* Referenzfigur ~1,75 m */
function human(p,x,z,base){
cyl(p,x,base+0.45,z,0.16,0.9,'#e0883c');cyl(p,x,base+1.12,z,0.20,0.55,'#e0883c');
const hd=document.createElement('a-sphere');hd.setAttribute('position',x+' '+(base+1.62)+' '+z);
hd.setAttribute('radius',0.12);hd.setAttribute('color','#f0b07a');p.appendChild(hd);
const t=document.createElement('a-text');t.setAttribute('value','1,75 m');t.setAttribute('color','#bb4a14');
t.setAttribute('align','center');t.setAttribute('width',1.6);t.setAttribute('position',x+' '+(base+1.95)+' '+z);
t.setAttribute('rotation','0 180 0');p.appendChild(t);}

/* Höhenlineal 0,5..2,5 m */
function ruler(p,x,z,base){
box(p,x,base+1.25,z,0.04,2.5,0.04,'#444');
for(let h=0.5;h<=2.5+1e-3;h+=0.5){
box(p,x,base+h,z+0.06,0.22,0.012,0.012,'#d92');
const t=document.createElement('a-text');t.setAttribute('value',h.toFixed(1).replace('.',',')+' m');
t.setAttribute('color','#a36b00');t.setAttribute('width',1.4);t.setAttribute('align','left');
t.setAttribute('position',(x+0.16)+' '+(base+h)+' '+(z+0.06));p.appendChild(t);}}

/* 1-m-Rasen-Raster */
function gridGround(scene){
const c=document.createElement('canvas');c.width=c.height=256;
const g=c.getContext('2d');g.fillStyle='#6ba85a';g.fillRect(0,0,256,256);
g.strokeStyle='rgba(255,255,255,0.30)';g.lineWidth=3;g.strokeRect(0,0,256,256);
const url=c.toDataURL();
const gr=document.createElement('a-plane');
gr.setAttribute('position','8 -0.02 5');gr.setAttribute('rotation','-90 0 0');
gr.setAttribute('width',90);gr.setAttribute('height',90);gr.setAttribute('color','#ffffff');gr.setAttribute('shadow','receive:true; cast:false');scene.appendChild(gr);
gr.addEventListener('loaded',()=>{const tex=new THREE.TextureLoader().load(url);
tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(90,90);
const m=gr.getObject3D('mesh');if(m){m.material.map=tex;m.material.needsUpdate=true;}});
H.walkables.push(gr);}

/* ===== REALISMUS: prozedurale Texturen + Material-Pass ===== */
function tex(draw,size){const c=document.createElement('canvas');c.width=c.height=size||512;draw(c.getContext('2d'),c.width);
const t=new THREE.TextureLoader().load(c.toDataURL());t.wrapS=t.wrapT=THREE.RepeatWrapping;t.anisotropy=4;return t;}
function drawWood(g,S){g.fillStyle='#9c6a3c';g.fillRect(0,0,S,S);const planks=4,pw=S/planks;
for(let i=0;i<planks;i++){const base=120+Math.random()*40;g.fillStyle='rgb('+(base+34|0)+','+(base-18|0)+','+(base-68|0)+')';g.fillRect(i*pw,0,pw,S);
g.strokeStyle='rgba(60,40,20,0.45)';g.lineWidth=2;g.strokeRect(i*pw,0,pw,S);
for(let k=0;k<26;k++){g.strokeStyle='rgba('+(90+Math.random()*40|0)+','+(60+Math.random()*30|0)+',30,0.22)';g.lineWidth=1;
const y=Math.random()*S;g.beginPath();g.moveTo(i*pw,y);g.bezierCurveTo(i*pw+pw*0.3,y+7,i*pw+pw*0.6,y-7,i*pw+pw,y+Math.random()*10-5);g.stroke();}}}
function drawTile(g,S){const n=4,tw=S/n;g.fillStyle='#8f969c';g.fillRect(0,0,S,S);

function setMap(el,t0,scale,rough){const m=el.getObject3D('mesh');if(!m){el.addEventListener('loaded',()=>setMap(el,t0,scale,rough));return;}
const w=parseFloat(el.getAttribute('width'))||1,d=parseFloat(el.getAttribute('depth'))||1;
const t=t0.clone();t.needsUpdate=true;t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(Math.max(1,Math.round(w/scale)),Math.max(1,Math.round(d/scale)));
m.material.map=t;m.material.color.set('#ffffff');m.material.roughness=rough;m.material.metalness=0;m.material.needsUpdate=true;}
function tuneGlass(el){const m=el.getObject3D('mesh');if(!m){el.addEventListener('loaded',()=>tuneGlass(el));return;}
m.material.roughness=0.05;m.material.metalness=0.0;m.material.transparent=true;m.material.opacity=0.16;m.material.color.set('#dfeef6');m.material.needsUpdate=true;}

const applySky=()=>{const m=sky.getObject3D('mesh');if(m){m.material.map=skyT;m.material.color.set('#ffffff');m.material.needsUpdate=true;}};

}
